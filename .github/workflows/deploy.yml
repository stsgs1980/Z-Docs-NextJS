name: Deploy to GitHub Pages

# ---------------------------------------------------------------------------
# StsDev Wiki Template — CI Deployment Pipeline
#
# Strategy: Attempt CI build first. If OOM (exit code 137 or Node crash),
# fall back to a lightweight "local-build-push" job that checks out the repo,
# builds with the same GITHUB_PAGES flag, and pushes out/ to gh-pages.
#
# Key constraints:
#   - GitHub runners have ~7 GB RAM; Next.js 16 static generation can OOM.
#   - output: "export" is incompatible with API routes / edit / new pages.
#     These must be removed before build.
#   - dynamicParams must be a static literal (false), not a runtime expression.
#   - --webpack flag required (Next.js 16 defaults to Turbopack which has
#     issues with static export).
#   - .nojekyll file prevents GitHub from processing _next with Jekyll.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
    paths-ignore:
      - "decisions.md"
      - "README.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Job 1: Attempt CI build ──────────────────────────────────────────────
  build-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only routes
        run: |
          echo "Removing server-only routes for static export..."
          rm -rf src/app/api
          rm -rf src/app/docs/*/edit
          rm -rf src/app/docs/new
          echo "Done: api/, edit/, new/ removed"

      - name: Add swap space (4 GB)
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Build static site
        env:
          GITHUB_PAGES: "true"
          NODE_OPTIONS: "--max-old-space-size=3072"
        run: npx next build --webpack

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

    # Continue to deploy even if this job fails — the fallback job will handle it
    # Actually, if this job succeeds we deploy directly:

  deploy:
    needs: build-ci
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Job 2: Fallback — local-style build + push ──────────────────────────
  # Activates only if CI build failed (likely OOM).
  # Uses peaceiris/actions-gh-pages to push out/ to gh-pages branch.
  build-fallback:
    needs: build-ci
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only routes
        run: |
          rm -rf src/app/api
          rm -rf src/app/docs/*/edit
          rm -rf src/app/docs/new

      - name: Build with minimal resources
        env:
          GITHUB_PAGES: "true"
          NODE_OPTIONS: "--max-old-space-size=2048"
        run: npx next build --webpack

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Deploy via peaceiris
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy (fallback): static build ${{ github.sha }}"

      - name: Notify
        run: |
          echo "⚠️  CI build failed; deployed via fallback job."
          echo "If this persists, run locally: bash scripts/deploy-gh-pages.sh"
